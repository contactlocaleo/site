<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Localeo — Packs de prestations locales</title>
  <meta name="description" content="Localeo incite les habitants à consommer local grâce à des packs de prestations locales." />

  <!-- Police simple (optionnel) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue:#1E4C8A;
      --blue2:#2B63B5;
      --orange:#F28C28;
      --ink:#0f172a;
      --muted:#475569;
      --border:#e2e8f0;
      --shadow: 0 18px 40px rgba(2, 6, 23, 0.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(900px 400px at 20% 0%, rgba(242,140,40,0.25), transparent 60%),
        radial-gradient(900px 400px at 80% 0%, rgba(43,99,181,0.25), transparent 60%),
        linear-gradient(180deg, #f8fafc 0%, #ffffff 60%, #f8fafc 100%);
      padding: 24px;
    }
    .card{
      width:min(720px, 100%);
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    header{
      padding: 26px 22px 16px;
      text-align:center;
      position:relative;
    }
    header:before{
      content:"";
      position:absolute;
      inset: -60px -60px auto -60px;
      height: 180px;
      background:
        radial-gradient(circle at 20% 30%, rgba(242,140,40,0.35), transparent 60%),
        radial-gradient(circle at 80% 40%, rgba(43,99,181,0.35), transparent 60%);
      transform: rotate(-2deg);
      filter: blur(1px);
    }
    .brand{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom: 10px;
    }
    .logo{
      width:54px;
      height:54px;
      border-radius:18px;
      background: linear-gradient(135deg, var(--orange), var(--blue));
      display:grid;
      place-items:center;
      color:#fff;
      font-family: Montserrat, Inter, sans-serif;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
      overflow:hidden;
      flex: 0 0 auto;
    }
    /* Si tu veux mettre un vrai logo, décommente l'image ci-dessous */
    /* .logo img{ width:100%; height:100%; object-fit:cover; display:block; } */

    .name{
      font-family: Montserrat, Inter, sans-serif;
      font-weight: 800;
      letter-spacing: -0.5px;
      font-size: 34px;
      line-height:1;
    }
    .name .eo{ color: var(--orange); }

    .tagline{
      position:relative;
      margin: 0 auto;
      max-width: 520px;
      font-family: Montserrat, Inter, sans-serif;
      font-weight: 800;
      letter-spacing: -0.4px;
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.2;
    }
    .tagline .accent{ color: var(--orange); }

    main{
      padding: 18px 22px 24px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }
    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background:#fff;
      text-decoration:none;
      font-weight: 700;
      color: var(--ink);
      transition: transform .05s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{
      box-shadow: 0 14px 28px rgba(2, 6, 23, 0.10);
      border-color: rgba(43,99,181,0.35);
    }
    .btn.primary{
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color:#fff;
      border-color: transparent;
    }
    .btn.primary:hover{
      box-shadow: 0 16px 30px rgba(30, 76, 138, 0.28);
    }
    .hint{
      text-align:center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .arrow{ opacity: .9; }
  </style>
</head>

<body>
  <div class="card">
    <header>
      <div class="brand">
        <div class="logo" aria-label="Logo Localeo">
          <!-- Option simple: lettre -->
          L

          <!-- Option image: place ton logo dans /docs/assets/logo.png et décommente :
          <img src="./assets/logo.png" alt="Localeo" />
          -->
        </div>

        <div class="name">Local<span class="eo">eo</span></div>
      </div>

      <p class="tagline">
        Attirez de <span class="accent">nouveaux clients</span><br>
        dans votre commerce.
      </p>
    </header>

    <main>
      <!-- Remplace les liens ci-dessous -->
      <a class="btn primary" href="https://TON-LIEN-FORMULAIRE" target="_blank" rel="noopener">
        Proposer une prestation (formulaire) <span class="arrow">→</span>
      </a>

      <a class="btn" href="https://TON-LIEN-FACEBOOK" target="_blank" rel="noopener">
        Suivre Localeo sur Facebook <span class="arrow">→</span>
      </a>

      <a class="btn" href="mailto:contact@ton-domaine.fr">
        Nous contacter <span class="arrow">→</span>
      </a>

      <div class="hint">Simple • Local • Sans engagement</div>
    </main>
  </div>
</body>
</html>
